name: Plugin Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
        node-version: [22, 24]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
      - run: npm ci
        name: NPM Install
      - name: Linting
        run: npm run format:ci
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.4.5
      - name: Run tests
        run: npm run test
